---
- name: Updater script present
  ansible.builtin.copy:
    src: strato-dyndns.py
    dest: /usr/local/bin/strato-dyndns.py
    owner: root
    mode: "ugo=rx,u+w"
- name: Network change hook present
  ansible.builtin.copy:
    src: 95-strato-dyndns
    dest: /etc/NetworkManager/dispatcher.d/95-strato-dyndns
    owner: root
    mode: "u=rwx,go=rx"
- name: Unit files present
  notify: Dyndns units changed
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/systemd/system/{{ item }}"
    owner: root
    mode: "ugo=r"
  loop:
    - strato-dyndns.service
    - strato-dyndns.timer
- name: Update timer active
  ansible.builtin.systemd_service:
    name: strato-dyndns.timer
    enabled: true
    state: started
