headless:
  children:
    homeserver:
      hosts:
        dm-poepperl.de:
          is_backup_sink: false
          user_shell: "/usr/sbin/nologin"
      vars:
        pgver: 13
        vault_port: 8087
        docs_port: 8000
        media_port: 8096
        cloud_base: 36
        cloud_php: "8.1"
        samba_users:
          - username: docs
            password: "{{ secrets.docs.samba }}"
        ports:
          cloud: 8088
    rpi:
      hosts:
        pi.hole:
          is_backup_sink: true
      vars:
        user_shell: "/usr/bin/nologin"
        auto_reboot: true
  vars:
    users:
      vault: 844
      scan: 835
      cloud: 832
      home: 865
      docs: 879
      media: 997
