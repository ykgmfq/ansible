---
- name: User group present
  ansible.builtin.group:
    name: "{{ role_name }}"
    gid: "{{ id }}"
    system: true
- name: User present
  ansible.builtin.user:
    name: "{{ role_name }}"
    comment: "{{ role_name }}"
    uid: "{{ id }}"
    ansible.builtin.group: "{{ role_name }}"
    system: true
    shell: "{{ user_shell }}"
