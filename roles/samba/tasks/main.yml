---
- name: Debian scan packages present
  ansible.builtin.apt:
    name:
      - samba
      - smbclient
    install_recommends: false
- import_tasks: smb_user.yml
- name: Samba config present
  ansible.builtin.template:
    src: smb.conf
    dest: /etc/samba/
- name: Network access allowed
  ansible.posix.firewalld:
    service: samba
    permanent: true
    state: enabled
