headless:
  children:
    homeserver:
      hosts:
        dm-poepperl.de:
          is_backup_system: false
          user_shell: "/usr/sbin/nologin"
      vars:
        apt_repos:
          - https://deb.debian.org/debian bullseye main contrib non-free
          - https://security.debian.org/debian-security bullseye-security main contrib non-free
        pgver: 13
        vault_port: 8087
        docs_port: 8000
        cloud_port: 9000
        cloud_base: 36
        cloud_php: "8.1"
        samba_users:
          - username: docs
            password: "{{ secrets.docs.samba }}"
    rpi:
      hosts:
        monitor.fritz.box:
        rpi-backup.fritz.box:
          is_backup_system: true
      vars:
        user_shell: "/usr/bin/nologin"
        apt_repos:
          - http://ports.ubuntu.com/ubuntu-ports jammy main restricted
          - http://ports.ubuntu.com/ubuntu-ports jammy universe
          - http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted
          - http://ports.ubuntu.com/ubuntu-ports jammy-updates universe
          - http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted
          - http://ports.ubuntu.com/ubuntu-ports jammy-security universe
        auto_reboot: false
  vars:
    users:
      vault: 844
      scan: 835
      cloud: 832
      home: 865
      docs: 879
      gnucash: 827
      digikam: 885
      wallabag: 875
    ansible_python_interpreter: /usr/bin/python3
    mail_smtpname: cloud@dm-poepperl.de
