---
- name: Facts set
  set_fact:
    dir: "/opt/container/{{ role_name }}"
- name: Directory present
  file:
    path: "{{ dir }}"
    state: directory
- name: Deployment present
  notify: "kube config changed"
  template:
    src: kube.yml.j2
    dest: "{{ dir }}/kube.yml"
- import_tasks: service.yml
- name: Volumes
  block:
    - name: ZFS volumes
      containers.podman.podman_volume:
        name: "{{ role_name }}-{{ item.key }}"
        options:
          - "device=data/{{ role_name }}{{ item.value }}"
          - "type=zfs"
      loop: "{{ vols | dict2items }}"
      vars:
        vols:
          data: ""
          db: /db
    - name: Local volumes
      containers.podman.podman_volume:
        name: "{{ role_name }}-icons"
- name: Caddyfile present
  template:
    src: Caddyfile
    dest: "/etc/caddy/avail/de.dm-poepperl.{{ role_name }}"
