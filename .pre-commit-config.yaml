repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: sort-simple-yaml
  - repo: https://github.com/ansible-community/ansible-lint
    rev: v6.21.1
    hooks:
      - id: ansible-lint
        files: \.(yaml|yml)$
