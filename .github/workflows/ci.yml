---
name: CI
on:
  push:
    branches: [master]
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - name: Install Ansible tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ansible-lint python3-pip python-is-python3
          ansible-galaxy collection install -r roles/requirements.yml
      - uses: pre-commit/action@v3.0.1
  butane:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - name: Validate server.butane
        run: |
          curl -fsSL -o /usr/local/bin/butane \
            https://github.com/coreos/butane/releases/latest/download/butane-x86_64-unknown-linux-gnu
          chmod +x /usr/local/bin/butane
          butane --strict server.butane > /dev/null
