---
- name: Debian packages present
  ansible.builtin.apt:
    name:
      - fish
      - ripgrep
      - fd-find
      - gnupg
      - exa
      - bat
      - htop
      - rclone
      - firewalld
    install_recommends: false
- name: Fish config directory present
  become: true
  ansible.builtin.file:
    dest: /root/.config/fish
    state: directory
    owner: root
    mode: "u=rwx,g=rx,o=x"
- name: Shell environment templates for root present
  become: true
  ansible.builtin.copy:
    src: config.fish
    dest: /root/.config/fish/config.fish
    owner: root
    mode: "u=rw,g=,o="
- name: Fish is login shell for root
  become: true
  ansible.builtin.user:
    name: root
    shell: /usr/bin/fish
- name: Import
  ansible.builtin.import_tasks: pam.yml
- name: Import
  ansible.builtin.import_tasks: ubuntu-clean.yml
