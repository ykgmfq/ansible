---
- name: Service providers
  hosts: homeserver
  remote_user: root
  roles:
    - cloud
    - docs
    - media
    - vault
- name: Common headless functionality present
  hosts: headless
  remote_user: root
  roles:
    - apt
    - common
    - vim
    - lid_switch
- name: Pihole
  remote_user: root
  hosts:
    - pi.hole
  roles:
    - pihole
