---
- name: Fact
  ansible.builtin.set_fact:
    container_name: nodered
- name: Service stopped
  ansible.builtin.systemd_service:
    state: stopped
    name: "container-{{ container_name }}"
  changed_when: false
  failed_when: false
- name: Container id file absent
  ansible.builtin.file:
    path: "/run/container-{{ container_name }}.ctr-id"
    state: absent
  changed_when: false
- name: Container present
  containers.podman.podman_container:
    image: "localhost/nodered"
    name: "{{ container_name }}"
    state: created
    network: host
    restart_policy: "no"
    volume:
      - "/srv/de.dm-poepperl.{{ container_name }}:/data"
    cidfile: "/run/container-{{ container_name }}.ctr-id"
    label:
      podman_systemd_unit: "container-{{ container_name }}.service"
      io.containers.autoupdate: local
    env:
      TZ: "Europe/Berlin"
- name: Service generated
  register: service
  when: not ansible_check_mode
  ansible.builtin.command:
    argv:
      - "/usr/bin/podman"
      - "generate"
      - "systemd"
      - "--name"
      - "--no-header"
      - "--new"
      - "{{ container_name }}"
  changed_when: false
- name: Service present
  when: not ansible_check_mode
  ansible.builtin.copy:
    content: "{{ service.stdout }}\n"
    dest: "/etc/systemd/system/container-{{ container_name }}.service"
    mode: "u=r,g=r,o=r"
- name: Service started
  ansible.builtin.systemd_service:
    state: started
    enabled: true
    name: "container-{{ container_name }}"
    daemon-reload: true
  changed_when: false
- name: Caddyfile present
  ansible.builtin.template:
    src: NodeCaddyfile
    dest: "/etc/caddy/avail/de.dm-poepperl.{{ container_name }}"
    mode: "u=r,g=r,o=r"
