---
- name: Facts set
  set_fact:
    pool_dir: "/srv/de.dm-poepperl.cloud"
    id: "{{ users.cloud }}"
    db_pw: "{{ secrets.cloud.db_pw }}"
    port: "{{ cloud_port }}"
- import_tasks: server.db.yml
- name: ZFS dataset present
  community.general.zfs:
    name: "data/{{ role_name }}"
    state: present
    extra_zfs_properties:
      mountpoint: "{{ pool_dir }}"
- name: Root directory present
  file:
    dest: "{{ pool_dir }}"
    state: directory
    owner: cloud
    mode: "u=rwx,g=rx,o=x"
- import_tasks: server.container.yml
- name: Caddyfile present
  notify: "web config changed"
  template:
    src: Caddyfile
    dest: "/etc/caddy/avail/de.dm-poepperl.{{ role_name }}"
