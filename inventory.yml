headless:
  children:
    homeserver:
      hosts:
        dm-poepperl.de:
          is_backup_sink: false
          user_shell: "/usr/sbin/nologin"
      vars:
        versions:
          paperless: "2.2"
          alpine: "3.19"
          fedora: "38"
          caddy: "2"
          redis: "7"
        samba_users:
          - username: docs
            password: "{{ secrets.docs.samba }}"
        ports:
          cloud: 8088
          vault: 8087
          docs: 8000
          media: 8096
    rpi:
      hosts:
        pihole.lan:
          is_backup_sink: true
      vars:
        user_shell: "/usr/bin/nologin"
        auto_reboot: true
  vars:
    u2f_key: TEST
    users:
      vault: 844
      scan: 879
      cloud: 832
      home: 865
      docs: 879
      media: 997
