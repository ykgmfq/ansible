---
- name: Package installed
  apt:
    name: caddy
- name: Config file directories present
  file:
    state: directory
    dest: "/etc/caddy/{{ item }}"
    owner: root
    group: root
    mode: "u=rx,g=rx,o=rx"
  loop:
    - avail
    - sites
- name: Main Caddy file present
  copy:
    src: Caddyfile
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "u=r,g=r,o=r"
