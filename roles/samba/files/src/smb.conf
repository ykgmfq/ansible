# to anonymous connections
map to guest = bad user

########## Domains ###########
[scans]
comment = Scan inbox
valid users = scan
path = /srv/scan
create mask = 0660
writable = yes
browsable = yes

[media]
comment = Jellyfin media collection
valid users = media
path = /srv/media
create mask = 0660
writable = yes
browsable = yes
