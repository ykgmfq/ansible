---
- name: Fish shell installed
  become: true
  community.general.rpm_ostree_pkg:
    name: fish
    state: present
- name: Services active
  ansible.builtin.systemd_service:
    name: "{{ item }}.service"
    state: started
  loop:
    - tuned
    - systemd-oomd
- name: Auto upgrade
  ansible.builtin.import_tasks: autoupgrade.yml
