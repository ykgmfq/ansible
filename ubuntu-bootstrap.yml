---
- name: Ubuntu root user bootstrap
  remote_user: dmp
  hosts: all
  tasks:
    - name: SSH key trusted
      become: true
      ansible.builtin.copy:
        src: "/home/{{ ansible_user_id }}/.ssh/authorized_keys"
        dest: "/root/.ssh/authorized_keys"
        remote_src: true
        mode: "u=r,go="
        owner: root
        group: root
