---
- name: Extension directories present
  ansible.builtin.file:
    path: "/var/lib/{{ item }}"
    state: directory
    mode: "ugo=rx,u+w"
  loop:
    - extensions
    - confexts
- name: Extension trees synced
  ansible.posix.synchronize:
    src: "extensions/{{ item.name }}/"
    dest: "/var/lib/{{ item.dest }}/{{ item.name }}/"
    delete: true
  loop:
    - {name: prod-units, dest: extensions}
    - {name: home-automation, dest: confexts}
- name: Stage host-config
  ansible.builtin.import_tasks: stage-host-config.yml
- name: Extension services active
  ansible.builtin.systemd_service:
    name: "systemd-{{ item }}.service"
    state: started
  loop:
    - sysext
    - confext
- name: Sysext merged
  ansible.builtin.command: systemd-sysext refresh
  changed_when: false
- name: Confext merged
  ansible.builtin.command: systemd-confext refresh
  changed_when: false
- name: Daemon reloaded
  ansible.builtin.systemd_service:
    daemon_reload: true
