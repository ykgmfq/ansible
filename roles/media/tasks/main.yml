---
- name: Facts set
  ansible.builtin.set_fact:
    id: "{{ users.media }}"
    dir: "/opt/container/{{ role_name }}"
- name: Import
  ansible.builtin.import_tasks: server.yml
  when: not is_backup_sink
- name: Network access allowed
  ansible.posix.firewalld:
    service: jellyfin
    permanent: true
    state: enabled
