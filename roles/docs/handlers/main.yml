---
- name: Restart deployment
  listen: "docs config changed"
  ansible.builtin.systemd_service:
    name: "{{ service }}"
    state: restarted
- name: Rebuild image
  listen: "docs build changed"
  notify: "docs config changed"
  ansible.builtin.command:
    chdir: "{{ dir }}"
    argv:
      - "/usr/bin/fish"
      - "build.fish"
  changed_when: true
