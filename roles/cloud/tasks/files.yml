---
- name: Directory present
  ansible.builtin.file:
    path: "{{ dir }}"
    state: directory
    mode: "u=r,g=r,o=r"
- name: Build sources present
  notify: "cloud build changed"
  ansible.builtin.copy:
    src: src/
    dest: "{{ dir }}/src/"
    mode: "u=r,g=r,o=r"
- name: Image builder present
  notify: "cloud build changed"
  ansible.builtin.template:
    src: build.fish
    dest: "{{ dir }}/build.fish"
    mode: "u=r,g=r,o=r"
- name: Deployment present
  notify: "cloud config changed"
  ansible.builtin.template:
    src: kube.yml.j2
    dest: "{{ dir }}/kube.yml"
    mode: "u=r,g=r,o=r"
- name: Caddyfile present
  notify: "web config changed"
  ansible.builtin.template:
    src: Caddyfile
    dest: "/etc/caddy/avail/de.dm-poepperl.{{ role_name }}"
    mode: "u=r,g=r,o=r"
