---
- name: Ubuntu root user bootstrap
  remote_user: root
  hosts: all
  tasks:
    - name: Root password set
      become: true
      ansible.builtin.user:
        name: root
        password: "{{ secrets.sys.root_pw | password_hash('sha512', 65534 | random(seed=inventory_hostname) | string) }}"
    - name: SSH key trusted
      become: true
      ansible.posix.authorized_key:
        user: root
        key: "{{ lookup('file', lookup('env','HOME') + '/.ssh/id.pub') }}"
    # - name: Public-key auth
- name: Ubuntu standard user disable
  remote_user: root
  hosts: all
  tasks:
    - name: Ubuntu user absent
      ansible.builtin.user:
        name: ubuntu
        state: absent
        force: true
