---
- name: Restart deployment
  listen: "cloud config changed"
  ansible.builtin.systemd_service:
    name: "{{ service }}"
    state: restarted
- name: Rebuild image
  listen: "cloud build changed"
  notify: "cloud config changed"
  ansible.builtin.command:
    chdir: "/opt/container/{{ role_name }}"
    argv:
      - "/usr/bin/fish"
      - "build.fish"
  changed_when: true
- name: Restart web server
  listen: "web config changed"
  ansible.builtin.systemd_service:
    name: caddy
    state: restarted
