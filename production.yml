---
- name: Common headless functionality present
  hosts: headless
  serial: 1
  remote_user: dmp
  become: true
  roles:
    - apt
    - common
    - vim
    - backup
    - lid_switch
- name: Service providers
  hosts: homeserver
  serial: 1
  remote_user: dmp
  become: true
  roles:
    - container
    - home
    - media
