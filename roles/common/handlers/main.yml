---
- name: Upgrade timer restarted
  listen: Upgrade timer changed
  ansible.builtin.systemd_service:
    name: rpm-ostreed-automatic.timer
    state: restarted
    daemon_reload: true
- name: Reboot notice
  listen: Layered package changed
  ansible.builtin.debug:
    msg: >-
      rpm-ostree staged a new deployment. Reboot the host (systemctl reboot)
      to activate the newly layered package(s).
