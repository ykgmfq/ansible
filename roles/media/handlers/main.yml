---
- name: Rebuild image
  listen: "media build changed"
  notify: "media config changed"
  ansible.builtin.systemd_service:
    name: "image-build@{{ role_name }}"
    state: started
- name: Restart deployment
  listen: "media config changed"
  ansible.builtin.systemd_service:
    name: "{{ service }}"
    state: restarted
