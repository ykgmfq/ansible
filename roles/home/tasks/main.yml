---
- name: Firewalld service present
  notify: "firewalld config changed"
  ansible.builtin.copy:
    src: homekit.xml
    dest: /etc/firewalld/services
    mode: "ugo=r"
# New service definitions must be loaded before "Network access allowed" can enable them
- name: Flush handlers
  ansible.builtin.meta: flush_handlers
- name: Udev rule present
  ansible.builtin.copy:
    src: conbee.rules
    dest: /etc/udev/rules.d
    mode: "ugo=r"
- name: Network access allowed
  ansible.posix.firewalld:
    service: '{{ item }}'
    permanent: true
    immediate: true
    state: enabled
  loop:
    - homekit
    - mdns
