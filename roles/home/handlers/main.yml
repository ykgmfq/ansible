---
- name: Facts established
  ansible.builtin.set_fact:
    home_automation_dir: "{{ persist_dir }}/{{ role_name }}"
    home_address: "192.168.122.141"
- name: Restart backup timer
  listen: "backup config changed"
  ansible.builtin.systemd_service:
    name: "backup@{{ role_name }}.timer"
    state: restarted
    daemon_reload: true
